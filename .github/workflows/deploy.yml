name: Deploy Browser Demo

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Run release packaging steps"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_mode == 'true') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install wasi-sdk
        uses: konsumer/install-wasi-sdk@v1
        with:
          version: "24"

      - name: Build WASM cores
        run: npm run cores

      - name: Copy example cores to webroot
        run: |
          mkdir -p web/cores
          cp build/cores/cores/*.wasm web/cores

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Upload WASM cores artifact
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_mode == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: wasm-cores
          path: build/cores/cores/*.wasm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  native-builds:
    needs: build
    if: needs.build.outputs.should_release == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ninja
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            choco install ninja -y
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            brew install ninja
          else
            sudo apt-get update
            sudo apt-get install -y ninja-build
          fi

      - name: Install Linux graphics dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglfw3 libglfw3-dev libx11-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libxext-dev libxfixes-dev libwayland-dev \
            libwayland-bin libxkbcommon-dev zip

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install LLVM (clang-cl)
        if: runner.os == 'Windows'
        run: choco install llvm -y

      - name: Add LLVM to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvm = "C:\Program Files\LLVM\bin"
          if (Test-Path $llvm) {
            Add-Content -Path $env:GITHUB_PATH -Value $llvm
          }

      - name: Set archive metadata
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "ARCHIVE_NAME=libretro-wasm-windows.zip" >> $GITHUB_ENV
            echo "BINARY_PATH=build/native/libretro_wasm.exe" >> $GITHUB_ENV
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "ARCHIVE_NAME=libretro-wasm-macos.zip" >> $GITHUB_ENV
            echo "BINARY_PATH=build/native/libretro_wasm" >> $GITHUB_ENV
          else
            echo "ARCHIVE_NAME=libretro-wasm-linux.zip" >> $GITHUB_ENV
            echo "BINARY_PATH=build/native/libretro_wasm" >> $GITHUB_ENV
          fi

      - name: Build native runtime
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            export CC=clang-cl
            export CXX=clang-cl
            cmake -S native -B build/native -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DWAMR_BUILD_SIMD=0 \
              -DWAMR_BUILD_INVOKE_NATIVE_GENERAL=1
            cmake --build build/native --config Release
          else
            npm run native
          fi

      - name: Package native runtime
        shell: bash
        run: |
          mkdir -p release
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            pwsh -Command "Compress-Archive -Path $env:BINARY_PATH -DestinationPath release/$env:ARCHIVE_NAME"
          else
            zip -j release/$ARCHIVE_NAME "$BINARY_PATH"
          fi

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ runner.os }}
          path: release/${{ env.ARCHIVE_NAME }}

  publish-release:
    needs: [build, native-builds]
    if: needs.build.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect release files
        run: |
          mkdir -p release
          find release-assets -name '*.zip' -exec cp {} release/ \;
          find release-assets -name '*.wasm' -exec cp {} release/ \;

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
