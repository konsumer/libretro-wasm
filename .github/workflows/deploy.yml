name: Deploy Browser Demo

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install wasi-sdk
        uses: konsumer/install-wasi-sdk@v1
        with:
          version: "24"

      - name: Build WASM cores
        run: make dist/minicore.wasm dist/quicknes.wasm

      - name: Assemble site bundle
        run: |
          mv src web/libretro
          mv dist web/cores

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
