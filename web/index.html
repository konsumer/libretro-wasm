<!doctype html>
<html lang="en" data-theme="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Libretro WASI Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script>
    (() => {
      const applyTheme = () => {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = prefersDark ? 'dark' : 'light';
      };
      applyTheme();
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
    })();
  </script>
  <style>
    .pixel {
      image-rendering: pixelated;
    }
  </style>
</head>

<body class="min-h-screen bg-base-200 text-base-content">
  <main class="flex min-h-screen items-center justify-center p-6">
    <section class="w-full max-w-4xl">
      <div class="card bg-base-100 shadow-2xl">
        <div class="card-body gap-8">
          <header class="space-y-2">
            <h1 class="card-title text-3xl">Libretro cores in the browser</h1>
            <p class="text-base-content/70">Pick any supported WebAssembly libretro core compiled with
              <strong>wasi-sdk</strong>, then stream frames, audio, and inputs entirely from JavaScript. Check us out on <a class=" btn-link" href="https://github.com/konsumer/libretro-wasm">Github</a></p>
          </header>

          <div class="flex flex-wrap gap-4">
            <label class="form-control w-full max-w-xs">
              <div class="label">
                <span class="label-text uppercase tracking-wide text-xs">Core</span>
              </div>
              <select id="coreSelect" class="select select-bordered w-full"></select>
            </label>

            <label class="form-control flex-1">
              <div class="label">
                <span id="romLabel" class="label-text uppercase tracking-wide text-xs">Load ROM</span>
              </div>
              <input id="romInput" type="file" class="file-input file-input-bordered w-full" />
            </label>

            <div class="flex items-end">
              <button id="resetBtn" type="button" class="btn btn-accent">Reset Core</button>
            </div>
          </div>

          <div class="rounded-box border border-base-300 bg-base-200 p-4">
            <canvas id="screen" width="256" height="240" class="w-full rounded-lg bg-black shadow-lg pixel"></canvas>
          </div>

          <div class="grid gap-4 text-sm grid-cols-1">
            <div class="stat bg-base-200 shadow">
              <div class="stat-title">Status</div>
              <div id="statusLine" class="stat-value text-xs whitespace-normal break-words">Loading core…</div>
              <span id="coreName" class="sr-only" aria-hidden="true">—</span>
              <span id="romName" class="sr-only" aria-hidden="true">—</span>
            </div>
          </div>

          <div class="alert alert-info mt-2 text-sm">
              <span class="flex flex-wrap gap-2 items-center text-base-content">
                <span class="font-semibold">Keyboard:</span>
              <span>D-Pad <kbd class="kbd kbd-sm bg-base-100 text-base-content">↑</kbd><kbd class="kbd kbd-sm bg-base-100 text-base-content">↓</kbd><kbd class="kbd kbd-sm bg-base-100 text-base-content">←</kbd><kbd class="kbd kbd-sm bg-base-100 text-base-content">→</kbd></span>
              <span><kbd class="kbd kbd-sm bg-base-100 text-base-content">Z</kbd> = B</span>
              <span><kbd class="kbd kbd-sm bg-base-100 text-base-content">X</kbd> = A</span>
              <span><kbd class="kbd kbd-sm bg-base-100 text-base-content">A</kbd> = Y</span>
              <span><kbd class="kbd kbd-sm bg-base-100 text-base-content">S</kbd> = X</span>
              <span><kbd class="kbd kbd-sm bg-base-100 text-base-content">Enter</kbd> = Start</span>
              <span><kbd class="kbd kbd-sm bg-base-100 text-base-content">Shift</kbd>/<kbd class="kbd kbd-sm bg-base-100 text-base-content">Space</kbd> = Select</span>
              </span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>

</html>
